# Field schemas defined once; referenced via YAML anchors below
x-field-defs:
  doc: &doc-fields
    - name: title
      type: string
      required: true
    - name: description
      type: text
    - name: slug
      type: string
      description: Override the URL slug (leave blank to use filename)
    - name: sidebar
      type: object
      fields:
        - name: order
          label: Sidebar Order
          type: number
    - name: body
      type: rich-text
  project: &project-fields
    - name: title
      type: string
      required: true
    - name: description
      type: text
    - name: url
      label: Project Website
      type: string
    - name: body
      type: rich-text
  meta: &meta-fields
    - name: label
      type: string
      required: true
    - name: order
      type: number
    - name: collapsed
      type: boolean

media:
  input: public/images
  output: /images
  extensions: [jpg, jpeg, png, gif, webp, svg, avif]

settings:
  content:
    merge: true

content:
  # ── Home ──────────────────────────────────────────────────────────────────
  - name: home
    label: Home Page
    type: file
    path: src/content/docs/index.md
    fields:
      - name: title
        type: string
        required: true
      - name: description
        type: text
      - name: body
        type: rich-text

  # ── About ─────────────────────────────────────────────────────────────────
  - name: about-meta
    label: About — Sidebar Config
    type: file
    path: src/content/docs/about/_meta.yml
    format: yaml
    fields: *meta-fields

  - name: about
    label: About
    type: collection
    path: src/content/docs/about
    subfolders: false
    filename: "{primary}.md"
    exclude: [_meta.yml]
    view:
      primary: title
      fields: [title, description]
    fields: *doc-fields

  # ── $BREAD Token ──────────────────────────────────────────────────────────
